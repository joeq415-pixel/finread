<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - FinRead</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    :root {
      --bg: #0F172A;
      --bg2: #1A2847;
      --text: #F8FAFC;
      --muted: #94A3B8;
      --accent: #22C55E;
      --accent2: #0EA5E9;
      --border: rgba(255,255,255,0.1);
    }
    body {
      font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      padding: 40px 20px;
      color: var(--text);
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background: linear-gradient(135deg, var(--bg2) 0%, rgba(26, 40, 71, 0.8) 100%);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 40px;
    }
    .header {
      text-align: center;
      margin-bottom: 40px;
    }
    .logo {
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 10px;
    }
    h1 {
      font-size: 2rem;
      color: var(--text);
      margin-bottom: 10px;
    }
    .subtitle {
      color: var(--muted);
      font-size: 1rem;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      color: var(--text);
      font-weight: 500;
      font-size: 0.9rem;
    }
    input,
    textarea {
      width: 100%;
      padding: 12px;
      background: rgba(255,255,255,0.04);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      font-size: 1rem;
      font-family: inherit;
      color: var(--text);
      transition: all 0.3s;
    }
    input::placeholder,
    textarea::placeholder {
      color: var(--muted);
      opacity: 0.5;
    }
    input:focus,
    textarea:focus {
      outline: none;
      border-color: var(--accent);
      background: rgba(34, 197, 94, 0.06);
    }
    textarea {
      resize: vertical;
      min-height: 150px;
    }
    .button {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s;
    }
    .button:hover {
      background: #20a84f;
    }
    .button:disabled {
      background: var(--muted);
      cursor: not-allowed;
    }
    .message {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      text-align: center;
      display: none;
    }
    .message.success {
      background: rgba(34, 197, 94, 0.2);
      color: var(--accent);
      border: 1px solid rgba(34, 197, 94, 0.3);
      display: block;
    }
    .message.error {
      background: rgba(239, 68, 68, 0.2);
      color: #ff6b6b;
      border: 1px solid rgba(239, 68, 68, 0.3);
      display: block;
    }
    .back-link {
      text-align: center;
      margin-top: 30px;
    }
    .back-link a {
      color: var(--accent2);
      text-decoration: none;
      font-size: 0.9rem;
    }
    .back-link a:hover {
      text-decoration: underline;
    }
    .info {
      background: rgba(34, 197, 94, 0.1);
      border-left: 4px solid var(--accent);
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 30px;
      font-size: 0.9rem;
      color: var(--muted);
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">FinRead</div>
      <h1>Contact Us</h1>
      <p class="subtitle">We'd love to hear from you. Send us a message!</p>
    </div>

    <div class="info">
      <strong>Response Time:</strong> We typically respond to inquiries within 24-48 hours during business days.
    </div>

    <div id="message" class="message"></div>

    <form id="contactForm">
      <div class="form-group">
        <label for="name">Your Name</label>
        <input type="text" id="name" name="name" required placeholder="John Doe">
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" required placeholder="you@example.com">
      </div>

      <div class="form-group">
        <label for="subject">Subject</label>
        <input type="text" id="subject" name="subject" required placeholder="How can we help?">
      </div>

      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" required placeholder="Tell us more..."></textarea>
      </div>

      <button type="submit" class="button" id="submitBtn">Send Message</button>
    </form>

    <div class="back-link">
      <a href="/">Back to FinRead</a>
    </div>
  </div>

  <script>
    const API = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
      ? 'http://localhost:3000'
      : `https://${window.location.hostname}`;

    const form = document.getElementById('contactForm');
    const messageDiv = document.getElementById('message');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const subject = document.getElementById('subject').value;
      const message = document.getElementById('message').value;

      submitBtn.disabled = true;
      submitBtn.textContent = 'Sending...';

      try {
        const response = await fetch(`${API}/api/contact`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, subject, message })
        });

        const data = await response.json();

        if (response.ok) {
          messageDiv.className = 'message success';
          messageDiv.textContent = data.message;
          form.reset();
          // Redirect after 2 seconds
          setTimeout(() => {
            window.location.href = '/';
          }, 2000);
        } else {
          messageDiv.className = 'message error';
          messageDiv.textContent = data.error || 'An error occurred';
        }
      } catch (error) {
        messageDiv.className = 'message error';
        messageDiv.textContent = 'An error occurred. Please try again.';
        console.error('Error:', error);
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Send Message';
      }
    });
  </script>
</body>
</html>
