<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - FinRead</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    :root {
      --bg: #0F172A;
      --bg2: #1A2847;
      --text: #F8FAFC;
      --muted: #94A3B8;
      --accent: #22C55E;
      --accent2: #0EA5E9;
      --border: rgba(255,255,255,0.1);
    }
    :root[data-theme="light"] {
      --bg: #FFFFFF;
      --bg2: #F8FAFC;
      --text: #0F172A;
      --muted: #64748B;
      --accent: #22C55E;
      --accent2: #0EA5E9;
      --border: rgba(0,0,0,0.1);
    }
    body {
      font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: var(--text);
    }
    .container {
      background: linear-gradient(135deg, var(--bg2) 0%, rgba(26, 40, 71, 0.8) 100%);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 400px;
      width: 100%;
      padding: 40px;
    }
    .logo {
      text-align: center;
      font-size: 1.5rem;
      margin-bottom: 30px;
      font-weight: 600;
      color: var(--accent);
    }
    h1 {
      font-size: 1.5rem;
      color: var(--text);
      margin-bottom: 10px;
      text-align: center;
    }
    .subtitle {
      text-align: center;
      color: var(--muted);
      margin-bottom: 30px;
      font-size: 0.9rem;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      color: var(--text);
      font-weight: 500;
      font-size: 0.9rem;
    }
    input {
      width: 100%;
      padding: 12px;
      background: rgba(255,255,255,0.04);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      font-size: 1rem;
      color: var(--text);
      transition: all 0.3s;
    }
    input::placeholder {
      color: var(--muted);
      opacity: 0.5;
    }
    input:focus {
      outline: none;
      border-color: var(--accent);
      background: rgba(34, 197, 94, 0.06);
    }
    .button {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s;
    }
    .button:hover {
      background: #20a84f;
    }
    .button:disabled {
      background: var(--muted);
      cursor: not-allowed;
    }
    .message {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      text-align: center;
      display: none;
    }
    .message.success {
      background: rgba(34, 197, 94, 0.2);
      color: var(--accent);
      border: 1px solid rgba(34, 197, 94, 0.3);
      display: block;
    }
    .message.error {
      background: rgba(239, 68, 68, 0.2);
      color: #ff6b6b;
      border: 1px solid rgba(239, 68, 68, 0.3);
      display: block;
    }
    .back-link {
      text-align: center;
      margin-top: 20px;
    }
    .back-link a {
      color: var(--accent2);
      text-decoration: none;
      font-size: 0.9rem;
    }
    .back-link a:hover {
      text-decoration: underline;
    }
    .password-requirements {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">FinRead</div>
    <h1>Reset Password</h1>
    <p class="subtitle">Enter a new password for your account.</p>

    <div id="message" class="message"></div>

    <form id="resetForm">
      <div class="form-group">
        <label for="password">New Password</label>
        <input type="password" id="password" name="password" required placeholder="Enter new password">
        <div class="password-requirements">Minimum 8 characters</div>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="Confirm password">
      </div>

      <button type="submit" class="button" id="submitBtn">Reset Password</button>
    </form>

    <div class="back-link">
      <a href="/">Back to FinRead</a>
    </div>
  </div>

  <script>
    // Load theme from localStorage
    const theme = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', theme);

    const API = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
      ? 'http://localhost:3000'
      : `https://${window.location.hostname}`;

    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');
    const form = document.getElementById('resetForm');
    const messageDiv = document.getElementById('message');
    const submitBtn = document.getElementById('submitBtn');

    if (!token) {
      messageDiv.className = 'message error';
      messageDiv.textContent = 'Invalid reset link. Please request a new password reset.';
      form.style.display = 'none';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (password !== confirmPassword) {
        messageDiv.className = 'message error';
        messageDiv.textContent = 'Passwords do not match';
        return;
      }

      if (password.length < 8) {
        messageDiv.className = 'message error';
        messageDiv.textContent = 'Password must be at least 8 characters';
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Resetting...';

      try {
        const response = await fetch(`${API}/api/auth/reset-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password })
        });

        const data = await response.json();

        if (response.ok) {
          messageDiv.className = 'message success';
          messageDiv.textContent = data.message + ' Redirecting to login...';
          form.reset();
          setTimeout(() => {
            window.location.href = '/';
          }, 2000);
        } else {
          messageDiv.className = 'message error';
          messageDiv.textContent = data.error || 'An error occurred';
        }
      } catch (error) {
        messageDiv.className = 'message error';
        messageDiv.textContent = 'An error occurred. Please try again.';
        console.error('Error:', error);
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Reset Password';
      }
    });
  </script>
</body>
</html>
