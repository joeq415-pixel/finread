<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify Email - FinRead</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 500px;
      width: 100%;
      padding: 40px;
      text-align: center;
    }
    .logo {
      font-size: 2rem;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 1.5rem;
      color: #333;
      margin-bottom: 10px;
    }
    p {
      color: #666;
      margin-bottom: 20px;
      line-height: 1.6;
    }
    .status {
      padding: 20px;
      border-radius: 8px;
      margin: 20px 0;
      font-weight: 500;
    }
    .status.loading {
      background: #e3f2fd;
      color: #1976d2;
    }
    .status.success {
      background: #e8f5e9;
      color: #2e7d32;
    }
    .status.error {
      background: #ffebee;
      color: #c62828;
    }
    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .button {
      background: #0066cc;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: background 0.3s;
      margin-top: 10px;
    }
    .button:hover {
      background: #0052a3;
    }
    .button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    .code-input {
      padding: 12px;
      border: 2px solid #ddd;
      border-radius: 6px;
      font-size: 1rem;
      width: 100%;
      margin-bottom: 10px;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">✓ FinRead</div>
    <h1>Verify Your Email</h1>

    <div id="content">
      <p>Verifying your email address...</p>
      <div class="spinner"></div>
      <div class="status loading">Checking verification link...</div>
    </div>
  </div>

  <script>
    const API = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
      ? 'http://localhost:3000'
      : `https://${window.location.hostname}`;

    // Get token from URL
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    const contentDiv = document.getElementById('content');

    async function verifyEmail() {
      if (!token) {
        showError('No verification token found. Please check your email link.');
        return;
      }

      try {
        const response = await fetch(`${API}/api/auth/verify-email`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token })
        });

        const data = await response.json();

        if (response.ok) {
          showSuccess('Email verified successfully! You can now close this page and continue using FinRead.');
          // Redirect to home after 3 seconds
          setTimeout(() => {
            window.location.href = '/';
          }, 3000);
        } else {
          showError(data.error || 'Verification failed. The link may have expired.');
        }
      } catch (error) {
        showError('An error occurred. Please try again later.');
        console.error('Verification error:', error);
      }
    }

    function showSuccess(message) {
      contentDiv.innerHTML = `
        <p style="font-size: 3rem; margin-bottom: 10px;">✓</p>
        <h1 style="color: #2e7d32;">Email Verified!</h1>
        <div class="status success">${message}</div>
        <p style="font-size: 0.9rem; color: #999;">Redirecting you back to FinRead...</p>
      `;
    }

    function showError(message) {
      contentDiv.innerHTML = `
        <p style="font-size: 3rem; margin-bottom: 10px;">✗</p>
        <h1 style="color: #c62828;">Verification Failed</h1>
        <div class="status error">${message}</div>
        <a href="/" class="button">Back to FinRead</a>
      `;
    }

    // Start verification immediately
    verifyEmail();
  </script>
</body>
</html>
